name: Update Blackout Schedule

on:
  schedule:
    - cron: "0 12 * * 1"  # Every Monday 12:00 UTC = 15:00 Israel (winter)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Update blackout schedule
        run: python update_blackout.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add blackout.json
          git diff --cached --quiet || git commit -m "Update blackout schedule $(date +%Y-%m-%d)"
          git push
