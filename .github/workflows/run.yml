name: Wrestling Digest

on:
  schedule:
    # 04:43 UTC = 07:43 Israel (summer, UTC+3). Off-the-hour minute (:43) to avoid
    # GitHub Actions' top-of-hour congestion, which can delay scheduled runs by 1-2h.
    # In winter (UTC+2) this becomes 06:43 Israel — change to "43 5 * * *" in October.
    - cron: "43 4 * * *"
  workflow_dispatch:       # manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run wrestling-digest
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        run: python main.py

      - name: Publish digest page
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --cached --quiet || git commit -m "Update digest $(date +%Y-%m-%d)"
          git pull --rebase origin master
          git push
