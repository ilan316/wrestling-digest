name: Wrestling Digest

on:
  schedule:
    # DST-proof: cron is UTC-only, so we fire at BOTH candidate times and let
    # main.py pick the run that lands on ~07:xx Israel time — no manual edits at
    # DST changeovers. Summer (UTC+3): 04:43→07:43. Winter (UTC+2): 05:43→07:43.
    # The other run each day exits early via the Israel-hour guard in main.py.
    # Off-the-hour minute (:43) avoids GitHub Actions' top-of-hour congestion.
    - cron: "43 4 * * *"
    - cron: "43 5 * * *"
  workflow_dispatch:       # manual trigger from GitHub UI (bypasses the time guard)

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run wrestling-digest
        env:
          PYTHONUNBUFFERED: "1"
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        run: python main.py

      - name: Publish digest page
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --cached --quiet || git commit -m "Update digest $(date +%Y-%m-%d)"
          git pull --rebase origin master
          git push
